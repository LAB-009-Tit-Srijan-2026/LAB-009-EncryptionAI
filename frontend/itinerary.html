<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Itinerary - TravelAI</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="nav-brand mb-2">
            <i class="fas fa-plane-departure"></i> TravelAI
        </a>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#" class="sidebar-link active" id="nav-itinerary"><i class="fas fa-map-marked-alt"></i> Itinerary</a>
            <a href="#" class="sidebar-link" id="nav-expenses"><i class="fas fa-wallet"></i> Expenses</a>
            <a href="#" class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-content">
        <div class="dashboard-header animate-fade-in">
            <div>
                <h1 id="trip-title">Loading Trip...</h1>
                <p class="text-secondary" id="trip-meta">Please wait...</p>
            </div>
            <div>
                <button class="btn btn-outline" onclick="window.print()"><i class="fas fa-file-pdf"></i> Export</button>
                <a href="#" class="btn btn-primary" id="btn-expenses"><i class="fas fa-wallet"></i> Manage Expenses</a>
            </div>
        </div>

        <div id="ai-loading" class="text-center py-5 animate-fade-in" style="display: none;">
            <div class="spinner" style="border-top-color: var(--primary); width: 50px; height: 50px; margin: 0 auto; border-width: 5px;"></div>
            <h2 class="mt-2 text-gradient">AI is crafting your perfect itinerary...</h2>
            <p class="text-secondary mt-1">Analyzing destinations, checking budgets, finding the best food spots.</p>
        </div>

        <div id="itinerary-content" style="display: none;">
            <div class="stats-grid animate-slide-up">
                <div class="glass-card stat-card">
                    <i class="fas fa-bed stat-icon" style="color: #6366f1; background: rgba(99, 102, 241, 0.1);"></i>
                    <div>
                        <h3 id="budget-hotel">$0</h3>
                        <p class="text-secondary">Hotel Est.</p>
                    </div>
                </div>
                <div class="glass-card stat-card">
                    <i class="fas fa-utensils stat-icon" style="color: #f59e0b; background: rgba(245, 158, 11, 0.1);"></i>
                    <div>
                        <h3 id="budget-food">$0</h3>
                        <p class="text-secondary">Food Est.</p>
                    </div>
                </div>
                <div class="glass-card stat-card">
                    <i class="fas fa-car stat-icon" style="color: #10b981; background: rgba(16, 185, 129, 0.1);"></i>
                    <div>
                        <h3 id="budget-transport">$0</h3>
                        <p class="text-secondary">Transport Est.</p>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <h2>Day-by-Day Plan</h2>
                <div class="timeline mt-2" id="timeline-container">
                    <!-- Timeline items injected here -->
                </div>
            </div>

            <div class="glass-card mt-3 animate-slide-up" style="animation-delay: 500ms; background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(236, 72, 153, 0.1)); border-color: var(--primary);">
                <h3><i class="fas fa-lightbulb text-warning"></i> AI Travel Tips</h3>
                <ul id="travel-tips" class="mt-1" style="list-style-type: disc; margin-left: 1.5rem; color: var(--text-secondary);">
                    <!-- Tips injected here -->
                </ul>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/itinerary.js"></script>
</body>
</html>
