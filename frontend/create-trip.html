<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Trip - AI Travel Planner</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="nav-brand mb-2">
            <i class="fas fa-plane-departure"></i> TravelAI
        </a>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="create-trip.html" class="sidebar-link active"><i class="fas fa-plus"></i> New Trip</a>
            <a href="#" class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-content">
        <div class="dashboard-header animate-fade-in">
            <div>
                <h1>Plan a New Trip</h1>
                <p class="text-secondary">Tell us your preferences and let AI do the magic.</p>
            </div>
        </div>

        <div class="glass-card animate-slide-up delay-100" style="max-width: 800px;">
            <form id="create-trip-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label class="form-label">Destination</label>
                        <input type="text" id="trip-destination" class="form-control" required placeholder="e.g. Goa, Manali, Paris">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Total Budget (₹)</label>
                        <input type="number" id="trip-budget" class="form-control" required min="1000" placeholder="e.g. 20000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Number of Days</label>
                        <input type="number" id="trip-days" class="form-control" required min="1" max="14" placeholder="e.g. 3">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Group Size</label>
                        <input type="number" id="trip-group-size" class="form-control" required min="1" max="20" placeholder="e.g. 4">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Interests & Preferences</label>
                    <textarea id="trip-interests" class="form-control" rows="3" required placeholder="e.g. Beaches, nightlife, historical places, affordable seafood..."></textarea>
                </div>

                <div style="text-align: right; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Create Trip <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/create_trip.js"></script>
</body>
</html>
