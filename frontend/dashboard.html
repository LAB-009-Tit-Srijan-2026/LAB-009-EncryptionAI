<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Travel Planner</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="nav-brand mb-2">
            <i class="fas fa-plane-departure"></i> TravelAI
        </a>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link active"><i class="fas fa-home"></i> Dashboard</a>
            <a href="create-trip.html" class="sidebar-link"><i class="fas fa-plus"></i> New Trip</a>
            <a href="#" class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-content">
        <!-- WanderLust Hero Banner -->
        <div class="hero-banner animate-fade-in">
            <div class="hero-badge mb-1">
                <i class="fas fa-sparkles"></i> Welcome to TravelAI Premium
            </div>
            <h1 id="user-greeting">Your World, Expertly Planned ✨</h1>
            <p class="text-white opacity-80">Explore your current trips or start a new adventure below.</p>
        </div>

        <div class="flex justify-between items-center mb-2">
            <h2>Your Active Trips</h2>
            <button class="btn btn-primary" onclick="window.location.href='create-trip.html'">
                <i class="fas fa-plus"></i> Create New Trip
            </button>
        </div>

        <div class="stats-grid animate-slide-up delay-100">
            <div class="glass-card stat-card">
                <i class="fas fa-plane stat-icon"></i>
                <div>
                    <h3 id="total-trips">0</h3>
                    <p class="text-secondary">Total Trips</p>
                </div>
            </div>
            <div class="glass-card stat-card">
                <i class="fas fa-wallet stat-icon" style="color: var(--success); background: rgba(16, 185, 129, 0.1);"></i>
                <div>
                    <h3 id="total-budget">$0</h3>
                    <p class="text-secondary">Planned Budget</p>
                </div>
            </div>
        </div>

        <div class="mt-3 animate-slide-up delay-200">
            <h2>Your Trips</h2>
            <div id="trips-container" class="trips-grid mt-1">
                <!-- Trips will be injected here -->
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
