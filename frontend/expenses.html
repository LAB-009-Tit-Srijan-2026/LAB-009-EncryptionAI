<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Splitter - TravelAI</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="nav-brand mb-2">
            <i class="fas fa-plane-departure"></i> TravelAI
        </a>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#" class="sidebar-link" id="nav-itinerary"><i class="fas fa-map-marked-alt"></i> Itinerary</a>
            <a href="#" class="sidebar-link active" id="nav-expenses"><i class="fas fa-wallet"></i> Expenses</a>
            <a href="#" class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-content">
        <div class="dashboard-header animate-fade-in">
            <div>
                <h1>Expense Splitter</h1>
                <p class="text-secondary" id="expense-meta">Manage group expenses effortlessly.</p>
            </div>
            <button class="btn btn-primary" onclick="document.getElementById('add-expense-modal').style.display='flex'">
                <i class="fas fa-plus"></i> Add Expense
            </button>
        </div>

        <div class="stats-grid animate-slide-up delay-100">
            <div class="glass-card stat-card">
                <i class="fas fa-file-invoice-dollar stat-icon"></i>
                <div>
                    <h3 id="total-spent">₹0</h3>
                    <p class="text-secondary">Total Spent</p>
                </div>
            </div>
            <div class="glass-card stat-card">
                <i class="fas fa-users stat-icon" style="color: var(--success); background: rgba(16, 185, 129, 0.1);"></i>
                <div>
                    <h3 id="per-person">₹0</h3>
                    <p class="text-secondary">Per Person</p>
                </div>
            </div>
        </div>

        <div class="mt-3 animate-slide-up delay-200">
            <h2>Recent Expenses</h2>
            <div id="expenses-list" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                <!-- Expenses injected here -->
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="add-expense-modal" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div class="glass-card animate-slide-up" style="width: 100%; max-width: 400px;">
            <h2 class="mb-2">Add New Expense</h2>
            <form id="expense-form">
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <input type="text" id="exp-desc" class="form-control" required placeholder="e.g. Dinner at beachfront">
                </div>
                <div class="form-group">
                    <label class="form-label">Amount (₹)</label>
                    <input type="number" id="exp-amount" class="form-control" required min="1">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('add-expense-modal').style.display='none'">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Expense</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/expenses.js"></script>
</body>
</html>
