<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Booking - TravelAI</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .booking-hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1600');
            background-size: cover;
            background-position: center;
            border-radius: 2rem;
            margin-bottom: -4rem;
            color: white;
        }
        .search-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        .search-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 1rem;
            border-radius: 100px;
            display: flex;
            gap: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .search-input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
            padding: 0 1.5rem;
            border-right: 1px solid #eee;
        }
        .search-input-group:last-child { border-right: none; }
        .search-input-group label { font-size: 0.7rem; font-weight: 700; color: #666; margin-bottom: 0.2rem; }
        .search-input-group input { border: none; background: transparent; font-size: 1rem; font-weight: 600; outline: none; }
        
        .booking-tabs {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
        }
        .booking-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid transparent;
        }
        .booking-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .booking-tab i { font-size: 1.5rem; }
        
        .booking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }
        .booking-card {
            border-radius: 1.5rem;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        .booking-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-content { padding: 1.5rem; }
        .price-tag {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
        }
        .ai-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--primary);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="dashboard-layout">
    <aside class="sidebar">
        <a href="index.html" class="nav-brand mb-2">
            <i class="fas fa-plane-departure"></i> TravelAI
        </a>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#" class="sidebar-link active"><i class="fas fa-suitcase-rolling"></i> Bookings</a>
            <a href="#" class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="dashboard-content">
        <div class="booking-hero animate-fade-in">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">Explore the World</h1>
            <p style="font-size: 1.2rem; opacity: 0.9;">Unified booking for hotels, transport, and activities.</p>
        </div>

        <div class="search-container animate-slide-up">
            <div class="search-bar">
                <div class="search-input-group">
                    <label>WHERE TO?</label>
                    <input type="text" id="search-dest" placeholder="Search destination..." value="Paris">
                </div>
                <div class="search-input-group">
                    <label>BUDGET</label>
                    <input type="number" id="search-budget" placeholder="Max price" value="1000">
                </div>
                <button class="btn btn-primary" id="btn-search" style="border-radius: 100px; padding: 0 2rem;">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>

        <div class="booking-tabs animate-fade-in" style="animation-delay: 200ms;">
            <div class="booking-tab active" data-tab="hotels">
                <i class="fas fa-hotel"></i>
                <span>Hotels</span>
            </div>
            <div class="booking-tab" data-tab="transport">
                <i class="fas fa-plane"></i>
                <span>Transport</span>
            </div>
            <div class="booking-tab" data-tab="activities">
                <i class="fas fa-camera-retro"></i>
                <span>Activities</span>
            </div>
        </div>

        <div id="booking-results" class="booking-grid">
            <!-- Results injected here -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
