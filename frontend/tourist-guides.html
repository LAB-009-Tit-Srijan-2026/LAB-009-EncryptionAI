<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Experts & Guides - TravelAI</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .guides-hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border-radius: var(--radius-card);
            margin-bottom: 3rem;
            border: 1px solid var(--glass-border);
        }
        .guides-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .guide-card {
            text-align: center;
            transition: var(--transition);
        }
        .guide-card:hover { transform: translateY(-5px); }
        .guide-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 4px solid var(--surface);
            box-shadow: var(--glass-shadow);
        }
    </style>
</head>
<body class="dashboard-layout" data-theme="light">
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="nav-brand mb-2">
            <i class="fas fa-plane-departure"></i> TravelAI
        </a>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#" class="sidebar-link" id="nav-itinerary"><i class="fas fa-map-marked-alt"></i> Itinerary</a>
            <a href="tourist-guides.html" class="sidebar-link active"><i class="fas fa-user-tie"></i> Guides</a>
            <a href="expenses.html" class="sidebar-link" id="nav-expenses"><i class="fas fa-wallet"></i> Expenses</a>
            <a href="#" onclick="logout()" class="sidebar-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="dashboard-content">
        <div class="guides-hero animate-fade-in">
            <h1 class="text-gradient">Local Experts & Guides</h1>
            <p class="text-secondary mt-1">Connect with verified professionals who know the city better than anyone else.</p>
        </div>

        <div class="flex justify-between items-center mb-2">
            <div class="flex gap-1">
                <button class="btn btn-sm btn-primary filter-btn active" data-city="all">All Locations</button>
                <button class="btn btn-sm btn-outline filter-btn" data-city="goa">Goa</button>
                <button class="btn btn-sm btn-outline filter-btn" data-city="bhopal">Bhopal</button>
                <button class="btn btn-sm btn-outline filter-btn" data-city="london">London</button>
                <button class="btn btn-sm btn-outline filter-btn" data-city="paris">Paris</button>
            </div>
            <div class="search-bar" style="width: 300px;">
                <i class="fas fa-search"></i>
                <input type="text" id="guide-search" placeholder="Search by name or expertise...">
            </div>
        </div>

        <div id="guides-container" class="guides-grid">
            <!-- Guides will be injected here -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        const HARDCODED_GUIDES = [
            { id: 1, name: "Rajesh Kumar", city: "bhopal", phone: "+91 98765 43210", expert: "Heritage & Culture", rating: 4.9, img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400" },
            { id: 2, name: "Amit Sharma", city: "bhopal", phone: "+91 91234 56789", expert: "Wildlife specialist", rating: 4.7, img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400" },
            { id: 3, name: "David D'Souza", city: "goa", phone: "+91 88888 77777", expert: "Beaches & Nightlife", rating: 4.8, img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400" },
            { id: 4, name: "Maria Gomes", city: "goa", phone: "+91 99999 00000", expert: "Old Goa Architecture", rating: 4.9, img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400" },
            { id: 5, name: "Arthur Morgan", city: "london", phone: "+44 20 1234 5678", expert: "Royal Landmarks", rating: 4.9, img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" },
            { id: 6, name: "Sarah Jenkins", city: "london", phone: "+44 77 9876 5432", expert: "Culinary & Pubs", rating: 4.8, img: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400" },
            { id: 7, name: "Jean-Luc Picard", city: "paris", phone: "+33 1 45 67 89 01", expert: "Art & Louvre", rating: 5.0, img: "https://images.unsplash.com/photo-1463453091185-61582044d556?w=400" },
            { id: 8, name: "Chloe Dubois", city: "paris", phone: "+33 6 12 34 56 78", expert: "Fashion & Montmartre", rating: 4.9, img: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            
            const lastTripId = localStorage.getItem('last_trip_id');
            if (lastTripId) {
                document.getElementById('nav-itinerary').href = `itinerary.html?id=${lastTripId}`;
                document.getElementById('nav-expenses').href = `expenses.html?id=${lastTripId}`;
            }

            renderGuides('all');

            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.replace('btn-primary', 'btn-outline'));
                    btn.classList.replace('btn-outline', 'btn-primary');
                    renderGuides(btn.dataset.city);
                });
            });

            document.getElementById('guide-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = HARDCODED_GUIDES.filter(g => 
                    g.name.toLowerCase().includes(term) || g.expert.toLowerCase().includes(term)
                );
                displayGuides(filtered);
            });
        });

        function renderGuides(city) {
            const filtered = city === 'all' ? HARDCODED_GUIDES : HARDCODED_GUIDES.filter(g => g.city === city);
            displayGuides(filtered);
        }

        function displayGuides(guides) {
            const container = document.getElementById('guides-container');
            container.innerHTML = guides.map(guide => `
                <div class="glass-card guide-card animate-slide-up">
                    <img src="${guide.img}" class="guide-img" alt="${guide.name}">
                    <h3>${guide.name}</h3>
                    <p class="text-primary font-bold small">${guide.expert}</p>
                    <div class="rating-mini mt-1 mb-1" style="justify-content: center;"><i class="fas fa-star"></i> ${guide.rating}</div>
                    <p class="text-secondary small mb-2"><i class="fas fa-location-dot"></i> ${guide.city.charAt(0).toUpperCase() + guide.city.slice(1)}</p>
                    <a href="tel:${guide.phone}" class="btn btn-primary btn-sm" style="width: 100%; justify-content: center;">
                        <i class="fas fa-phone"></i> Contact Expert
                    </a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
